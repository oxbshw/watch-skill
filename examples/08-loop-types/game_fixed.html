<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Brick Bounce</title>
<style>
  body { margin: 0; background: #101820; display: flex; flex-direction: column;
         align-items: center; font-family: monospace; color: #e8e8e8; }
  #hud { font-size: 42px; padding: 18px; }
  canvas { background: #16222e; border: 2px solid #2c3e50; }
</style>
</head>
<body>
<div id="hud">SCORE: <span id="score">0</span></div>
<canvas id="game" width="600" height="300"></canvas>
<script>
  const ctx = document.getElementById("game").getContext("2d");
  const scoreEl = document.getElementById("score");
  let x = 60, y = 60, dx = 5, dy = 4;
  let score = 0;  // fixed: initialized, the counter stays numeric
  function tick() {
    ctx.clearRect(0, 0, 600, 300);
    ctx.fillStyle = "#f0b21e";
    ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2); ctx.fill();
    x += dx; y += dy;
    if (x < 14 || x > 586) { dx = -dx; score = score + 1; }
    if (y < 14 || y > 286) { dy = -dy; score = score + 1; }
    scoreEl.textContent = score;
    requestAnimationFrame(tick);
  }
  tick();
</script>
</body>
</html>
