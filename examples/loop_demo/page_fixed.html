<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ShopDemo Checkout</title>
<style>
  body { font-family: Segoe UI, Arial, sans-serif; background: #f4f6f8; margin: 0; }
  .card { width: 460px; margin: 60px auto; background: #fff; border-radius: 12px;
          padding: 32px; box-shadow: 0 4px 18px rgba(0,0,0,.08); }
  h1 { font-size: 26px; margin: 0 0 18px; color: #1a2733; }
  .row { display: flex; justify-content: space-between; font-size: 18px;
         padding: 8px 0; color: #3a4a5a; }
  .total { font-size: 34px; font-weight: 700; color: #0a7d36; margin-top: 18px; }
  .buy { display: block; width: 100%; margin-top: 24px; padding: 14px 0;
         font-size: 20px; border: 0; border-radius: 8px; cursor: pointer;
         background: #0a7d36; color: #ffffff; }
</style>
</head>
<body>
  <div class="card">
    <h1>ShopDemo Checkout</h1>
    <div class="row"><span>Wireless mouse</span><span>$19.00</span></div>
    <div class="row"><span>USB-C cable</span><span>$10.00</span></div>
    <div class="total" id="total">TOTAL: $--</div>
    <button class="buy">BUY NOW</button>
  </div>
  <script>
    const prices = [19.00, 10.00];
    const total = (prices[0] + prices[1]).toFixed(2);
    document.getElementById("total").textContent = "TOTAL: $" + total;
  </script>
</body>
</html>
